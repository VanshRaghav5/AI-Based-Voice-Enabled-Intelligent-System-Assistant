<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com;">
    <title>AI Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body class="dark-theme">
    <div id="app" class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-orb"></div>
                <span class="brand-name">Aether<span>AI</span></span>
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" title="Dashboard">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </div>
                <div class="nav-item" title="Logs">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <div class="nav-item" title="Settings">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path
                            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                        </path>
                    </svg>
                </div>
            </nav>
            <div class="status-brief">
                <div class="pulse-indicator"></div>
                <span class="status-text">SYSTEM READY</span>
            </div>
        </aside>

        <!-- Main Workspace -->
        <main class="workspace">
            <header class="top-bar">
                <div class="search-field">
                    <svg class="icon search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" placeholder="Search commands or docs...">
                </div>
                <div class="user-meta">
                    <div id="network-badge" class="network-badge offline">
                        <span class="dot"></span> <span class="network-text">Disconnected</span>
                    </div>
                </div>
            </header>

            <section class="viewport">
                <div id="status-mount"></div>

                <div class="hero-section">
                    <h1 class="glow-text">How can I help you today?</h1>
                    <p class="subtitle">Aether is active and listening for your automation commands.</p>
                </div>

                <div id="control-mount" class="control-center"></div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="label">API Latency</span>
                        <span class="value">12ms</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Uptime</span>
                        <span class="value">4h 22m</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Tasks Completed</span>
                        <span class="value">128</span>
                    </div>
                </div>
            </section>

            <footer class="terminal-shelf">
                <div class="shelf-header">
                    <h3>Execution Logs</h3>
                    <div class="shelf-actions">
                        <span class="mode-label">LOCAL MODE</span>
                        <button class="clear-btn">Clear</button>
                    </div>
                </div>
                <div id="log-mount" class="log-viewport"></div>
            </footer>
        </main>
    </div>

    <!-- Notification Toasts -->
    <div id="notification-mount"></div>

    <script src="renderer.js"></script>
</body>

</html>
